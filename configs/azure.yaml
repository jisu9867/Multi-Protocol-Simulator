adapter: mqtt

generator:
  source_id: ""  # Empty to auto-generate in format "{factory}-line{number}"
  factory_id: "Ulsan"  # Base factory ID (ignored if random_factory is true)
  equipment_type: "Sensor"
  equipment_name: ""  # Empty to auto-generate based on tag and line number
  random_factory: true  # Randomly select factory (Ulsan, Asan, Jeonju) - 3 factories
  random_source: true   # Randomly generate source ID in format "{factory}-line{1-3}" - 3 lines
  tags:
    - tag: "temp"
      pattern: "uniform"
      min: 20.0
      max: 70.0
      unit: "C"
      quality: "Good"
    
    - tag: "humidity"
      pattern: "normal"
      min: 30.0
      max: 80.0
      mean: 55.0
      stddev: 10.0
      unit: "%"
      quality: "Good"
    
    - tag: "pressure"
      pattern: "sine"
      min: 900.0
      max: 1100.0
      unit: "hPa"
      quality: "Good"
    
    - tag: "vibration"
      pattern: "randomwalk"
      min: 0.0
      max: 10.0
      step_size: 0.5
      unit: "mm/s"
      quality: "Good"

engine:
  rate_mode: "interval"
  interval_ms: 1000
  jitter_percent: 10.0
  queue_size: 1000
  overflow_policy: "drop_oldest"
  retry_count: 3
  metrics_interval: 10s

mqtt:
  # Azure Container Instances에 배포된 Mosquitto broker
  # FQDN 확인: az container show --resource-group rg-gateway-dev-korea-01 --name mosquitto-broker --query ipAddress.fqdn -o tsv
  broker: "mosquitto-gateway-12345.cjbuhadbabauejec.koreacentral.azurecontainer.io"
  client_id: "simulator-azure-001"
  username: ""  # 인증이 필요 없는 경우 빈 문자열
  password: ""  # 인증이 필요 없는 경우 빈 문자열
  tls: false
  keepalive: 60
  qos: 1
  retain: false
  topic_template: "factory/{source_id}/telemetry"  # source_id already contains factory and line info (e.g., asan-line3)
  # line: "line-1"  # Not needed when using source_id format
  reconnect_max_retries: 10
  reconnect_max_wait: 60s
  reconnect_initial_wait: 1s

