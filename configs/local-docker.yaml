# local.yaml과 동일. 컨테이너 MQTT(Gateway Compose Mosquitto, 호스트 1884)로 publish
# 사용: .\simulator.exe run --config .\configs\local-docker.yaml
# 전제: Gateway는 docker compose up 으로 실행 중, Simulator는 호스트에서 실행

adapter: mqtt

generator:
  source_id: ""  # Empty to auto-generate in format "{factory}-line{number}"
  factory_id: "Ulsan"  # Base factory ID (ignored if random_factory is true)
  equipment_type: "Sensor"
  equipment_name: ""  # Empty to auto-generate based on tag and line number
  random_factory: true  # Randomly select factory (Ulsan, Asan, Jeonju) - 3 factories
  random_source: true   # Randomly generate source ID in format "{factory}-line{1-3}" - 3 lines
  tags:
    - tag: "temp"
      pattern: "uniform"
      min: 20.0
      max: 70.0
      unit: "C"
      quality: "Good"
    
    - tag: "humidity"
      pattern: "uniform"
      min: 30.0
      max: 80.0
      unit: "%"
      quality: "Good"
    
    - tag: "pressure"
      pattern: "uniform"
      min: 900.0
      max: 1100.0
      unit: "hPa"
      quality: "Good"
    
    - tag: "vibration"
      pattern: "uniform"
      min: 0.0
      max: 1.0
      unit: "mm/s"
      quality: "Good"
    
    - tag: "power"
      pattern: "uniform"
      min: 200.0
      max: 300.0
      unit: "kW"
      quality: "Good"
    
    - tag: "flow"
      pattern: "uniform"
      min: 100.0
      max: 150.0
      unit: "L/min"
      quality: "Good"

engine:
  rate_mode: "interval"
  interval_ms: 1000
  jitter_percent: 10.0
  queue_size: 1000
  overflow_policy: "drop_oldest"
  retry_count: 3
  metrics_interval: 10s

mqtt:
  # Gateway Compose Mosquitto (호스트에서 접속 시 1884)
  broker: "localhost:1884"
  client_id: "simulator-docker-001"
  username: ""
  password: ""
  tls: false
  keepalive: 60
  qos: 1
  retain: false
  topic_template: "factory/{line}/{source_id}/telemetry"
  line: "line-1"
  reconnect_max_retries: 10
  reconnect_max_wait: 60s
  reconnect_initial_wait: 1s
