adapter: mqtt

generator:
  source_id: "sim-001"
  tags:
    - tag: "temp"
      pattern: "uniform"
      min: 20.0
      max: 70.0
      unit: "C"
      quality: "Good"
    
    - tag: "humidity"
      pattern: "normal"
      min: 30.0
      max: 80.0
      mean: 55.0
      stddev: 10.0
      unit: "%"
      quality: "Good"
    
    - tag: "pressure"
      pattern: "sine"
      min: 900.0
      max: 1100.0
      unit: "hPa"
      quality: "Good"

engine:
  rate_mode: "rate"
  rate: 100.0  # 100 messages per second
  jitter_percent: 5.0
  queue_size: 5000
  overflow_policy: "drop_oldest"
  retry_count: 3
  metrics_interval: 5s

mqtt:
  broker: "localhost:1883"
  client_id: "simulator-high-rate"
  username: ""
  password: ""
  tls: false
  keepalive: 60
  qos: 0  # QoS 0 for high throughput
  retain: false
  topic_template: "factory/{line}/{source_id}/telemetry"
  line: "line-1"
  reconnect_max_retries: 10
  reconnect_max_wait: 60s
  reconnect_initial_wait: 1s

